services:
  - type: web
    name: placeprep-backend
    env: docker
    plan: free
    rootDir: backend
    envVars:
      - key: PORT
        value: 8080
  
  - type: web
    name: placeprep-frontend
    env: static
    buildCommand: npm install; npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: placeprep-backend
          type: web
          property: host
