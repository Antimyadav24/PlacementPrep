spring.application.name=portal

# Server Port
server.port=8082

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:file:./data/placeprep
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
app.jwtSecret=PlacePrepSecretKeyForJwtAuthenticationWhichShouldBeVeryLongAndSecure12345
app.jwtExpirationMs=86400000

# CORS Configuration
app.cors.allowedOrigins=http://localhost:5173,http://127.0.0.1:5173
